<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <script src="https://cdn.jsdelivr.net/npm/echarts@5.4.3/dist/echarts.min.js"></script>
    <meta charset="UTF-8">
    <title>农业合作社物资管理系统</title>
    <link rel="stylesheet" href="styles.css">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
</head>
<body>
<nav class="navbar">
    <div class="nav-container">
        <div class="nav-logo"><i class="fas fa-tractor"></i> <span>物资管理系统</span></div>
        <ul class="nav-menu">
            <li class="nav-item"><a href="#dashboard" class="nav-link active">工作台</a></li>
            <li class="nav-item"><a href="#materials" class="nav-link">物资库</a></li>
            <li class="nav-item"><a href="#purchase" class="nav-link">采购入库</a></li>
            <li class="nav-item"><a href="#outbound" class="nav-link">物资领用</a></li>
            <li class="nav-item"><a href="#basic" class="nav-link">基础信息</a></li>
        </ul>
    </div>
</nav>

<main class="main-content">
    <!-- 1. 工作台 -->
    <section id="dashboard" class="section active">
        <div class="hero-section">
            <h1>工作台数据驾驶舱</h1>
            <!-- 顶部统计卡片 -->
            <div class="stats-grid">
                <div class="stat-card"><h3>物资种类</h3><p class="stat-number" id="stat-mat">--</p></div>
                <div class="stat-card"><h3>总库存件数</h3><p class="stat-number" id="stat-stock">--</p></div>
                <div class="stat-card" style="color:#e74c3c"><h3>库存预警</h3><p class="stat-number" id="stat-alert">--</p></div>
                <div class="stat-card"><h3>本月单据</h3><p class="stat-number" id="stat-po">--</p></div>
            </div>

            <!-- 新增：图表区域 -->
            <div style="display: flex; gap: 20px; margin-top: 20px;">
                <!-- 左边：库存类别饼图 -->
                <div style="flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                    <h3>物资分类占比</h3>
                    <div id="chart-pie" style="width: 100%; height: 300px;"></div>
                </div>
                <!-- 右边：库存价值柱状图 -->
                <div style="flex: 1; background: white; padding: 20px; border-radius: 8px; box-shadow: 0 2px 5px rgba(0,0,0,0.1);">
                    <h3>各仓库库存价值 (元)</h3>
                    <div id="chart-bar" style="width: 100%; height: 300px;"></div>
                </div>
            </div>
        </div>
    </section>

    <!-- 2. 物资库 -->
    <section id="materials" class="section">
        <div class="section-header">
            <h2>物资列表</h2>
            <button id="btn-add-mat" class="btn btn-primary"><i class="fas fa-plus"></i> 新增物资</button>
        </div>
        <div class="table-container">
            <table class="data-table" id="table-mat">
                <thead><tr><th style="width: 60px;">序号</th><th>名称</th><th>类别</th><th>规格</th><th>库存</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <!-- 3. 采购入库模块 -->
    <section id="purchase" class="section">
        <div class="section-header">
            <h2>采购入库记录</h2>
            <button id="btn-add-po" class="btn btn-primary"><i class="fas fa-cart-plus"></i> 新建采购单</button>
        </div>
        <div class="table-container">
            <table class="data-table" id="table-po">
                <thead><tr><th>单号</th><th>供应商</th><th>仓库</th><th>日期</th><th>总金额</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <!-- 4. 物资领用模块 -->
    <section id="outbound" class="section">
        <div class="section-header">
            <h2>物资领用记录</h2>
            <button id="btn-add-out" class="btn btn-charity" style="background:#e67e22"><i class="fas fa-clipboard-check"></i> 新建领用单</button>
        </div>
        <div class="table-container">
            <table class="data-table" id="table-out">
                <thead><tr><th>单号</th><th>出库仓库</th><th>日期</th><th>用途</th><th>操作</th></tr></thead>
                <tbody></tbody>
            </table>
        </div>
    </section>

    <!-- 5. 基础信息模块 -->
    <section id="basic" class="section">
        <div class="section-header"><h2>基础数据</h2></div>
        <div style="display:flex; gap:20px;">
            <div class="table-container" style="flex:1">
                <h3>供应商列表</h3>
                <table class="data-table" id="table-sup"><thead><tr><th>ID</th><th>名称</th><th>联系人</th></tr></thead><tbody></tbody></table>
            </div>
            <div class="table-container" style="flex:1">
                <h3>仓库列表</h3>
                <table class="data-table" id="table-ware"><thead><tr><th>ID</th><th>名称</th></tr></thead><tbody></tbody></table>
            </div>
        </div>
    </section>
</main>

<!-- 通用弹窗容器 -->
<div id="modal-overlay" class="modal-overlay" style="display: none;">
    <!-- 这里的内容会由 JS 动态生成 -->
    <div class="modal-content" id="modal-body"></div>
</div>

<script src="script.js"></script>
</body>
</html>
